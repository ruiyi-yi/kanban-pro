version: '3.8'

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: kanban-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - server
    restart: unless-stopped

  # Backend API server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kanban-server
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/data/kanban.db
      - JWT_SECRET=change-me-in-production
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - server-data:/data
      - ./uploads:/app/uploads
    restart: unless-stopped

  # Redis for caching & rate limiting
  redis:
    image: redis:7-alpine
    container_name: kanban-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  server-data:
  redis-data:
